name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Scan For Leaked Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Secrets Scan Summary
        run: echo "No leaks detected" >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend Lint, Security, And Tests
    runs-on: ubuntu-latest
    needs: secrets-scan
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pos_ci
          POSTGRES_USER: pos_ci
          POSTGRES_PASSWORD: pos_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pos_ci -d pos_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg2://pos_ci:pos_ci_password@localhost:5432/pos_ci
      JWT_SECRET_KEY: ci-dummy-jwt-secret-at-least-32-characters-long
      ENVIRONMENT: test
      DEBUG: "false"
      ENABLE_API_DOCS: "true"
      SEED_DEMO_DATA: "false"
      REFRESH_COOKIE_SECURE: "false"
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint Backend With Ruff
        run: python -m ruff check app tests --select E9,F63,F7,F82

      - name: Run Bandit Security Check
        run: python -m bandit -r app

      - name: Run Backend Tests
        run: python -m pytest tests

  frontend:
    name: Frontend Audit, Lint, And Build
    runs-on: ubuntu-latest
    needs: secrets-scan
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Audit Frontend Dependencies
        run: npm audit --audit-level=high

      - name: Lint Frontend
        run: npm run lint

      - name: Build Frontend
        run: npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Image Names
        id: images
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${repo}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${repo}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ steps.images.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ steps.images.outputs.frontend }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  publish-ghcr:
    name: Publish Images To GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Image Names
        id: images
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${repo}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${repo}-frontend" >> "$GITHUB_OUTPUT"

      - name: Log In To GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ github.sha }}
            ${{ steps.images.outputs.backend }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build And Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ github.sha }}
            ${{ steps.images.outputs.frontend }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
